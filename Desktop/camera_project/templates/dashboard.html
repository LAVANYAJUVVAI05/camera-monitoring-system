<!DOCTYPE html>
<html>
<head>
<title>Camera Dashboard</title>

<style>

body{
font-family: Arial;
background: linear-gradient(120deg,#4facfe,#00f2fe);
margin:0;
padding:0;
}

.container{
width:80%;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2575fc;
color:white;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f5f5f5;
}

.online{
color:white;
background:#28a745;
padding:5px 10px;
border-radius:20px;
}

.offline{
color:white;
background:#dc3545;
padding:5px 10px;
border-radius:20px;
}

button{
background:#2575fc;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#0056d2;
}

.form-box{
margin-top:30px;
display:none;
}

input,select{
padding:10px;
width:200px;
margin:5px;
border-radius:5px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<div class="container">

<h2>NTR District Camera Monitoring</h2>

<table id="table">

<tr>
<th>Place</th>
<th>Camera</th>
<th>Status</th>
</tr>

</table>

<button onclick="showForm()">Update</button>

<div class="form-box" id="form">

<h3>Add Camera</h3>

<input id="place" placeholder="Place">
<input id="camera" placeholder="Camera Type">

<select id="mode">
<option value="online">Online</option>
<option value="offline">Offline</option>
</select>

<button onclick="addCamera()">Add</button>

</div>

</div>

<script>

async function loadTable(){

const res = await fetch("/cameras")
const data = await res.json()

const table=document.getElementById("table")

data.forEach(r=>{

let statusClass = r.camera_mode === "online" ? "online" : "offline"

table.innerHTML += `
<tr>
<td>${r.place_name}</td>
<td>${r.camera_name}</td>
<td><span class="${statusClass}">${r.camera_mode}</span></td>
</tr>
`

})

}

function showForm(){
document.getElementById("form").style.display="block"
}

async function addCamera(){

await fetch("/cameras",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
place_name:place.value,
camera_name:camera.value,
camera_mode:mode.value
})

})

location.reload()

}

loadTable()

</script>

</body>
</html>
